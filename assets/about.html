<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8"/>
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src file: 'self';"/>
	<style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0f1e;
            color: #e8edf5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 7px;
            -webkit-user-select: none;
            user-select: none;
        }

        img {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            margin-bottom: 4px;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .version {
            font-size: 0.82rem;
            color: #8896aa;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: #1f2d45;
            margin: 4px 0;
        }

        a {
            color: #0084ff;
            text-decoration: none;
            font-size: 0.85rem;
        }

        a:hover {
            text-decoration: underline;
        }

        .license {
            font-size: 0.78rem;
            color: #8896aa;
        }
	</style>
</head>
<body>
<img src="../icons/icon.png" alt="Messenger Desktop"/>
<h1>Messenger Desktop</h1>
<span class="version" id="version"></span>
<div class="divider"></div>
<a href="https://mkavalecz.github.io/messenger-desktop/">mkavalecz.github.io/messenger-desktop</a>
<span class="license">Released under the MIT License</span>

<script>
	const version = new URLSearchParams(location.search).get('version');
	document.getElementById('version').textContent = version ? 'Version ' + version : '';
</script>
</body>
</html>
