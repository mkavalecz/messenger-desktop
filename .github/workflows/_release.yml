on:
  workflow_call:
    inputs:
      version_type:
        description: 'Version bump type: minor or major'
        required: true
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.version_type }}
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Push commit and tag
        run: git push --follow-tags

  build:
    needs: bump-version
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: v${{ needs.bump-version.outputs.version }}

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build:ci

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: dist-${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.deb
            dist/*.rpm
            dist/*.dmg

  release:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: v${{ needs.bump-version.outputs.version }}
          name: v${{ needs.bump-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
